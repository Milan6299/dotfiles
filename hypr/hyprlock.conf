# source = ~/.config/hypr/colors.conf

# BACKGROUND
background {
    monitor =
    path = /home/modisarkar69/Wallpapers/Vague/vagaswords.png
    blur_passes = 0
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(216, 222, 233, .7)
    font_size = 60
    font_family = JetBrains Mono
    position = 50, 250
    halign = left
    valign = bottom
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color = rgba(216, 222, 233, .7)
    font_size = 28
    font_family = JetBrains Mono
    position = 50, 200
    halign = left
    valign = bottom
}

# USER
label {
    monitor =
    text = cmd[update:0] echo "  $USER"
    color = rgba(216, 222, 233, 0.80)
    font_size = 20
    font_family = JetBrains Mono Bold
    position = 50, 120
    halign = left
    valign = bottom
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 0
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = JetBrains Mono Bold
    placeholder_text = Password
    hide_input = false
    position = 50, 50
    halign = left
    valign = bottom
    rounding = 0
}
