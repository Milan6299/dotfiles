# : }}}

# : Task manager {{{
[tasks]
border  = { fg = "#c98c5a" }
title   = { fg = "#c98c5a" }
hovered = { fg = "#c98c5a", bold = true }
# : }}}

# : Help menu {{{
[help]
on      = { fg = "#c98c5a" }
run     = { fg = "#6d7d8c" }
desc    = { fg = "#d8c8a8" }
hovered = { fg = "#26211c", bg = "#302822", bold = true }
footer  = { fg = "#26211c", bg = "#c98c5a" }
# : }}}

# : File-specific styles {{{
[filetype]
rules = [
	# Image
	{ mime = "image/*", fg = "#6d7d8c" },
	# Media
	{ mime = "{audio,video}/*", fg = "#78907a" },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#c0a36e" },
	# Document
	{ mime = "application/{pdf,doc,rtf}", fg = "#8b9560" },
	# Virtual file system
	{ mime = "vfs/{absent,stale}", fg = "#b7a78d" },
	# Special file
	{ url = "*", is = "orphan", bg = "#b85c4d" },
	{ url = "*", is = "exec"  , fg = "#8b9560" },
	# Dummy file
	{ url = "*", is = "dummy", bg = "#b85c4d" },
	{ url = "*/", is = "dummy", bg = "#b85c4d" },
	# Fallback
	{ url = "*/", fg = "#c98c5a" }
]
# : }}}
[icon]
prepend_conds = [
	# This targets all directories and gives them your theme's tan color
	{ if = "dir",  text = "", fg = "#c98c5a" },
]
