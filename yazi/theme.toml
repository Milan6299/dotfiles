title_warn  = { fg = "#c0a36e", bold = true }
title_error = { fg = "#b85c4d", bold = true }

# Icons
icon_info  = ""
icon_warn  = ""
icon_error = ""
# : }}}

# : Picker {{{
[pick]
border   = { fg = "#c98c5a" }
active   = { fg = "#c98c5a", bold = true }
inactive = { fg = "#b7a78d" }
# : }}}

# : Input {{{
[input]
border   = { fg = "#c98c5a" }
