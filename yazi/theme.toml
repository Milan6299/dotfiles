perm_write = { fg = "#b85c4d" }
perm_exec  = { fg = "#c98c5a" }

# Progress
progress_label  = { fg = "#c98c5a", bold = true }
progress_normal = { fg = "#c98c5a", bg = "#3a312a" }
progress_error  = { fg = "#b85c4d", bg = "#3a312a" }
# : }}}

# : Which {{{
[which]
