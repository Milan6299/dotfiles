# Yazi theme generated from: Gruvbox
# Auto-generated by theme switcher

"" = "https://yazi-rs.github.io/schemas/theme.json"

# : Flavor {{{
[flavor]
dark  = ""
light = ""
# : }}}

# : Manager {{{
[mgr]
cwd = { fg = "#c98c5a" }

# Hovered
hovered         = { bg = "#c98c5a", fg = "#26211c" }
preview_hovered = { fg = "#c98c5a", underline = true }

# Find
find_keyword  = { fg = "#6d7d8c", bold = true, italic = true, underline = true }
find_position = { fg = "#6d7d8c", bg = "reset", bold = true, italic = true }

# Symlink
symlink_target = { fg = "#c98c5a", italic = true }

# Marker
marker_copied   = { fg = "#8b9560", bg = "#8b9560" }
marker_cut      = { fg = "#b85c4d", bg = "#b85c4d" }
marker_marked   = { fg = "#78907a", bg = "#78907a" }
marker_selected = { fg = "#c98c5a", bg = "#c98c5a" }

# Count
count_copied   = { fg = "#d8c8a8", bg = "#8b9560" }
count_cut      = { fg = "#d8c8a8", bg = "#b85c4d" }
count_selected = { fg = "#d8c8a8", bg = "#c98c5a" }

# Border
border_symbol = "│"
border_style  = { fg = "#54483e" }

# Highlighting
syntect_theme = ""
# : }}}

# : Tabs {{{
[tabs]
active   = { bg = "#c98c5a", fg = "#26211c", bold = true }
inactive = { fg = "#c98c5a", bg = "#302822" }

# Separator
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }
# : }}}

# : Mode {{{
[mode]
normal_main = { bg = "#c98c5a", fg = "#26211c", bold = true }
normal_alt  = { fg = "#c98c5a", bg = "#302822" }

# Select mode
select_main = { bg = "#c0a36e", fg = "#26211c", bold = true }
select_alt  = { fg = "#c0a36e", bg = "#302822" }

# Unset mode
unset_main = { bg = "#b85c4d", fg = "#26211c", bold = true }
unset_alt  = { fg = "#b85c4d", bg = "#302822" }
# : }}}

# : Status bar {{{
[status]
