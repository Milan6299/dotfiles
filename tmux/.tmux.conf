unbind r
bind r source-file ~/.tmux.conf

set -g default-terminal "${TERM}"
set -ag terminal-overrides ",*:RGB"

set -g prefix C-s

set -g mouse on

set -g base-index 1
setw -g pane-base-index 1

set -g renumber-windows on

set-window-option -g mode-keys vi

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind c new-window -c "#{pane_current_path}"
bind \` switch-client -t'{marked}'
bind-key "|" split-window -h -c "#{pane_current_path}"
bind-key "\\" split-window -fh -c "#{pane_current_path}"

bind-key "-" split-window -v -c "#{pane_current_path}"
bind-key "_" split-window -fv -c "#{pane_current_path}"

# bind-key -r f display-popup -E "bash -lc '~/.local/bin/tmux-sessionizer'"
bind-key -r i run-shell "tmux new-window ~/.local/bin/chsht"
bind-key -r g run-shell "tmux new-window ~/.local/bin/quickedit"
# bind-key -r i display-popup -E "bash -lc '~/.local/bin/chst'"
bind-key -r f split-window -fv -l 10 "~/.local/bin/tmux-sessionizer"
bind-key Tab switch-client -l
# sync cache when sessions change
set-hook -g session-created  'run-shell "~/.local/bin/tmux-sessionizer-sync"'
set-hook -g session-closed   'run-shell "~/.local/bin/tmux-sessionizer-sync"'

set-option -g status-position top


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g status-left ""
set -g status-right "#S"

set -g window-status-style "default"
set -g window-status-current-style "default"
set -g status-style "default"

set -g window-status-format " #I:#W "

# Highlight current window (blue)
set -g window-status-current-format "#[bg=cyan,fg=black,nobold] #I:#W* "

set -g window-status-bell-style "bg=red,nobold"

set-option -g history-limit 5000

#vim-tmux-navigator
set -g @vim_navigator_mapping_left "C-Left C-h"  # use C-h and C-Left
set -g @vim_navigator_mapping_right "C-Right C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
